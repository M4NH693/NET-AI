{% extends "base.html" %}

{% block content %}
<div class="container my-auto">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 col-xl-5">
            <!-- Glassmorphism Form Card -->
            <div class="glass-card p-4 p-sm-5">
                <div class="text-center mb-4">
                    <i class="bi bi-box-arrow-in-right fs-1"
                        style="background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
                    <h2 class="h3 fw-bold mt-2 text-light">Đăng nhập</h2>
                    <p class="text-secondary fs-7">Kết nối đến tài khoản NetAI của bạn</p>
                </div>

                <!-- Alert Message Area -->
                <div id="alertBox" class="alert d-none alert-custom" role="alert">
                    <div class="d-flex align-items-center">
                        <i id="alertIcon" class="bi me-2 fs-5"></i>
                        <span id="alertMessage"></span>
                    </div>
                </div>

                <form id="loginForm" onsubmit="submitLogin(event)">
                    <!-- Email -->
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required
                            name="email">
                        <label for="emailInput"><i class="bi bi-envelope me-2"></i>Địa chỉ Email</label>
                    </div>

                    <!-- Password -->
                    <div class="form-floating mb-2">
                        <input type="password" class="form-control" id="passwordInput" placeholder="Password" required
                            name="password">
                        <label for="passwordInput"><i class="bi bi-lock me-2"></i>Mật khẩu</label>
                    </div>

                    <div class="d-flex justify-content-end mb-4">
                        <a href="/forgot-password" class="text-decoration-none small"
                            style="color: #00C6FF; font-weight: 500;">Quên mật khẩu?</a>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="btnSubmit"
                        class="btn btn-premium w-100 py-3 mb-3 d-flex align-items-center justify-content-center gap-2">
                        <span>Đăng nhập</span>
                        <div id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></div>
                    </button>

                    <div class="text-center mt-3">
                        <p class="text-secondary small mb-0">
                            Chưa có tài khoản? <a href="/register" class="text-decoration-none"
                                style="color: #E100FF; font-weight: 500;">Đăng ký ngay</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block extra_js %}
<script>
    // Guest-only page check
    checkAuth(false);

    async function submitLogin(event) {
        event.preventDefault();

        const alertBox = document.getElementById('alertBox');
        const alertIcon = document.getElementById('alertIcon');
        const alertMessage = document.getElementById('alertMessage');
        const btnSubmit = document.getElementById('btnSubmit');
        const btnSpinner = document.getElementById('btnSpinner');

        const email = document.getElementById('emailInput').value.trim();
        const password = document.getElementById('passwordInput').value;

        // Hide previous alert
        alertBox.classList.add('d-none');
        alertBox.className = 'alert alert-custom';

        // Show loading state
        btnSubmit.disabled = true;
        btnSpinner.classList.remove('d-none');

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });

            const data = await response.json();

            if (response.ok) {
                // Save token to localStorage
                setToken(data.access_token);

                showAlert('Đăng nhập thành công! Đang chuyển hướng...', 'success');

                // Get redirect url from query parameter or default to Home
                const params = new URLSearchParams(window.location.search);
                const redirectUrl = params.get('redirect') || '/';

                setTimeout(() => {
                    window.location.href = redirectUrl;
                }, 1000);
            } else {
                const errorDetail = data.detail || 'Email hoặc mật khẩu không chính xác.';
                showAlert(errorDetail, 'error');
                btnSubmit.disabled = false;
                btnSpinner.classList.add('d-none');
            }
        } catch (error) {
            console.error('Lỗi kết nối:', error);
            showAlert('Không thể kết nối đến máy chủ. Vui lòng thử lại sau.', 'error');
            btnSubmit.disabled = false;
            btnSpinner.classList.add('d-none');
        }
    }

    function showAlert(message, type) {
        const alertBox = document.getElementById('alertBox');
        const alertIcon = document.getElementById('alertIcon');
        const alertMessage = document.getElementById('alertMessage');

        alertMessage.innerHTML = message;
        alertBox.classList.remove('d-none');

        if (type === 'success') {
            alertBox.classList.add('alert-success');
            alertIcon.className = 'bi bi-check-circle-fill text-success';
        } else {
            alertBox.classList.add('alert-danger');
            alertIcon.className = 'bi bi-exclamation-triangle-fill text-danger';
        }
    }
</script>
{% endblock extra_js %}
