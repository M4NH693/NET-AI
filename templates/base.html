<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if title %}NetAI - {{ title }}{% else %}NetAI Portal{% endif %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/main2.css') }}">
    <!-- Client-side Auth Script -->
    <script src="{{ url_for('static', path='js/auth.js') }}"></script>
    {% block extra_css %}{% endblock extra_css %}
</head>
<body>
    <!-- Background Glow Effects -->
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <!-- Glassmorphism Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark glass-navbar sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="bi bi-cpu text-info me-2 fs-3"></i>
                <span class="logo-text fs-4">NetAI</span>
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <!-- Left-aligned elements (blank or navigation) -->
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Trang chủ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/chat">Trợ lý AI</a>
                    </li>
                </ul>
                
                <!-- Right-aligned elements (Authentication) -->
                <div id="navbarAuth" class="d-flex align-items-center gap-2 mt-3 mt-lg-0">
                    <div class="spinner-border spinner-border-sm text-light opacity-50" role="status"></div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow-1 d-flex flex-column py-5">
        {% block content %}{% endblock content %}
    </main>

    <!-- Footer -->
    <footer class="py-3 text-center border-top" style="border-color: var(--border-color) !important; background: rgba(11, 15, 25, 0.5);">
        <div class="container text-secondary fs-7">
            &copy; 2026 NetAI. Phát triển bởi Antigravity.
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block extra_js %}{% endblock extra_js %}
</body>
</html>
