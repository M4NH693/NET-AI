{% extends "base.html" %}

{% block content %}
<div class="container my-auto">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 col-xl-5">
            <!-- Glassmorphism Card -->
            <div class="glass-card p-4 p-sm-5">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock-fill fs-1" style="background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
                    <h2 class="h3 fw-bold mt-2 text-light" id="pageTitle">Khôi phục mật khẩu</h2>
                    <p class="text-secondary fs-7" id="pageSubtitle">Vui lòng nhập email của bạn để nhận mã xác thực OTP 4 số</p>
                </div>

                <!-- Alert Message Area -->
                <div id="alertBox" class="alert d-none alert-custom" role="alert">
                    <div class="d-flex align-items-center">
                        <i id="alertIcon" class="bi me-2 fs-5"></i>
                        <span id="alertMessage"></span>
                    </div>
                </div>

                <!-- STEP 1: Enter Email -->
                <form id="step1Form" onsubmit="submitSendOTP(event)">
                    <div class="form-floating mb-4">
                        <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
                        <label for="emailInput"><i class="bi bi-envelope me-2"></i>Địa chỉ Email của bạn</label>
                    </div>

                    <button type="submit" id="btnSendOTP" class="btn btn-premium w-100 py-3 mb-3 d-flex align-items-center justify-content-center gap-2">
                        <span>Gửi mã xác thực</span>
                        <div id="btnSpinner1" class="spinner-border spinner-border-sm d-none" role="status"></div>
                    </button>
                    
                    <div class="text-center mt-3">
                        <a href="/login" class="text-decoration-none small" style="color: #00C6FF; font-weight: 500;">
                            <i class="bi bi-arrow-left me-1"></i>Quay lại đăng nhập
                        </a>
                    </div>
                </form>

                <!-- STEP 2: Enter OTP & New Password (Hidden by default) -->
                <form id="step2Form" class="d-none" onsubmit="submitResetPassword(event)">
                    <!-- Email field (read-only for context) -->
                    <div class="mb-3">
                        <label class="text-secondary small mb-1">Email khôi phục</label>
                        <div class="p-3 bg-dark bg-opacity-40 rounded border border-secondary border-opacity-10 text-light fw-medium" id="emailDisplay"></div>
                    </div>

                    <!-- OTP Code -->
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control text-center fs-4 fw-bold" id="otpInput" placeholder="1234" required pattern="\d{4}" maxlength="4" style="letter-spacing: 8px;">
                        <label for="otpInput"><i class="bi bi-key me-2"></i>Mã OTP 4 số *</label>
                    </div>

                    <!-- New Password -->
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="passwordInput" placeholder="New Password" required minlength="8">
                        <label for="passwordInput"><i class="bi bi-lock me-2"></i>Mật khẩu mới *</label>
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="confirmPasswordInput" placeholder="Confirm Password" required minlength="8">
                        <label for="confirmPasswordInput"><i class="bi bi-shield-lock me-2"></i>Xác nhận mật khẩu mới *</label>
                    </div>

                    <button type="submit" id="btnResetPassword" class="btn btn-premium w-100 py-3 mb-3 d-flex align-items-center justify-content-center gap-2">
                        <span>Đặt lại mật khẩu</span>
                        <div id="btnSpinner2" class="spinner-border spinner-border-sm d-none" role="status"></div>
                    </button>
                    
                    <div class="text-center mt-3">
                        <button type="button" class="btn btn-link text-decoration-none small p-0" style="color: #00C6FF;" onclick="backToStep1()">
                            <i class="bi bi-arrow-left me-1"></i>Thay đổi email khác
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block extra_js %}
<script src="{{ url_for('static', path='js/forgot_password.js') }}"></script>
{% endblock extra_js %}
