{% extends "base.html" %}

{% block content %}
<div class="container my-auto">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 col-xl-5">
            <!-- Glassmorphism Form Card -->
            <div class="glass-card p-4 p-sm-5">
                <div class="text-center mb-4">
                    <i class="bi bi-box-arrow-in-right fs-1"
                        style="background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
                    <h2 class="h3 fw-bold mt-2 text-light">Đăng nhập</h2>
                    <p class="text-secondary fs-7">Kết nối đến tài khoản NetAI của bạn</p>
                </div>

                <!-- Alert Message Area -->
                <div id="alertBox" class="alert d-none alert-custom" role="alert">
                    <div class="d-flex align-items-center">
                        <i id="alertIcon" class="bi me-2 fs-5"></i>
                        <span id="alertMessage"></span>
                    </div>
                </div>

                <form id="loginForm" onsubmit="submitLogin(event)">
                    <!-- Email -->
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required
                            name="email">
                        <label for="emailInput"><i class="bi bi-envelope me-2"></i>Địa chỉ Email</label>
                    </div>

                    <!-- Password -->
                    <div class="form-floating mb-2">
                        <input type="password" class="form-control" id="passwordInput" placeholder="Password" required
                            name="password">
                        <label for="passwordInput"><i class="bi bi-lock me-2"></i>Mật khẩu</label>
                    </div>

                    <div class="d-flex justify-content-end mb-4">
                        <a href="/forgot-password" class="text-decoration-none small"
                            style="color: #00C6FF; font-weight: 500;">Quên mật khẩu?</a>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="btnSubmit"
                        class="btn btn-premium w-100 py-3 mb-3 d-flex align-items-center justify-content-center gap-2">
                        <span>Đăng nhập</span>
                        <div id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></div>
                    </button>

                    <div class="text-center mt-3">
                        <p class="text-secondary small mb-0">
                            Chưa có tài khoản? <a href="/register" class="text-decoration-none"
                                style="color: #E100FF; font-weight: 500;">Đăng ký ngay</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block extra_js %}
<script src="{{ url_for('static', path='js/login.js') }}"></script>
{% endblock extra_js %}
