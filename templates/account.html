{% extends "base.html" %}

{% block content %}
<div class="container my-auto">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
            <!-- Glassmorphism Form Card -->
            <div class="glass-card p-4 p-sm-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-gear fs-1"
                        style="background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
                    <h2 class="h3 fw-bold mt-2 text-light">Quản lý tài khoản</h2>
                    <p class="text-secondary fs-7">Cập nhật thông tin cá nhân và mật khẩu của bạn</p>
                </div>

                <!-- Alert Message Area -->
                <div id="alertBox" class="alert d-none alert-custom" role="alert">
                    <div class="d-flex align-items-center">
                        <i id="alertIcon" class="bi me-2 fs-5"></i>
                        <span id="alertMessage"></span>
                    </div>
                </div>

                <div class="row g-4">
                    <!-- Left: Profile Read Only details & Avatar -->
                    <div class="col-md-5 border-end border-secondary border-opacity-10 pe-md-4 text-center text-md-start">
                        <h4 class="h6 fw-semibold text-secondary text-uppercase mb-3">Ảnh đại diện</h4>
                        
                        <!-- Avatar Display & Upload Area -->
                        <div class="position-relative d-inline-block mb-4">
                            <img id="avatarPreview" src="/static/profile_pics/default.jpg" alt="Avatar" class="rounded-circle border border-secondary border-opacity-20 shadow" style="width: 150px; height: 150px; object-fit: cover;">
                            <label for="avatarUploadInput" class="position-absolute bottom-0 end-0 bg-primary bg-gradient text-white rounded-circle d-flex align-items-center justify-content-center shadow-lg" style="width: 38px; height: 38px; cursor: pointer; border: 2px solid var(--bg-dark);">
                                <i class="bi bi-camera-fill"></i>
                            </label>
                            <input type="file" id="avatarUploadInput" class="d-none" accept="image/*" onchange="uploadAvatarFile(this)">
                            
                            <!-- Upload Progress Spinner Overlay -->
                            <div id="avatarSpinner" class="position-absolute top-50 start-50 translate-middle d-none bg-dark bg-opacity-75 rounded-circle d-flex align-items-center justify-content-center" style="width: 150px; height: 150px;">
                                <div class="spinner-border text-info" role="status" style="width: 2rem; height: 2rem;"></div>
                            </div>
                        </div>

                        <h4 class="h6 fw-semibold text-secondary text-uppercase mb-3">Thông tin hệ thống</h4>

                        <div class="mb-3">
                            <label class="text-secondary small mb-1">Tên đăng nhập</label>
                            <div class="p-3 bg-dark bg-opacity-40 rounded border border-secondary border-opacity-10 text-light fw-medium"
                                id="usernameText">
                                <span class="spinner-border spinner-border-sm text-secondary opacity-50"
                                    role="status"></span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="text-secondary small mb-1">Địa chỉ Email</label>
                            <div class="p-3 bg-dark bg-opacity-40 rounded border border-secondary border-opacity-10 text-light fw-medium text-truncate"
                                id="emailText">
                                <span class="spinner-border spinner-border-sm text-secondary opacity-50"
                                    role="status"></span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="text-secondary small mb-1">Ngày tham gia</label>
                            <div class="p-3 bg-dark bg-opacity-40 rounded border border-secondary border-opacity-10 text-light fw-medium"
                                id="joinedDateText">
                                <span class="spinner-border spinner-border-sm text-secondary opacity-50"
                                    role="status"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Profile Edit form -->
                    <div class="col-md-7 ps-md-4">
                        <h4 class="h6 fw-semibold text-secondary text-uppercase mb-3">Cập nhật thông tin</h4>

                        <form id="profileForm" onsubmit="submitUpdateProfile(event)">
                            <!-- Full Name -->
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="fullNameInput" placeholder="Nguyễn Văn A">
                                <label for="fullNameInput"><i class="bi bi-person me-2"></i>Họ và tên</label>
                            </div>

                            <hr class="my-4 border-secondary border-opacity-15">

                            <h4 class="h6 fw-semibold text-secondary text-uppercase mb-3">Thay đổi mật khẩu</h4>

                            <!-- New Password -->
                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" id="passwordInput"
                                    placeholder="New Password" minlength="8">
                                <label for="passwordInput"><i class="bi bi-lock me-2"></i>Mật khẩu mới (để trống nếu
                                    không đổi)</label>
                            </div>

                            <!-- Confirm New Password -->
                            <div class="form-floating mb-4">
                                <input type="password" class="form-control" id="confirmPasswordInput"
                                    placeholder="Confirm New Password" minlength="8">
                                <label for="confirmPasswordInput"><i class="bi bi-shield-lock me-2"></i>Xác nhận mật
                                    khẩu mới</label>
                            </div>

                            <!-- Submit Button -->
                            <button type="submit" id="btnSubmit"
                                class="btn btn-premium w-100 py-3 d-flex align-items-center justify-content-center gap-2">
                                <i class="bi bi-check-circle-fill"></i>
                                <span>Lưu thay đổi</span>
                                <div id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status">
                                </div>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block extra_js %}
<script src="{{ url_for('static', path='js/account.js') }}"></script>
{% endblock extra_js %}
