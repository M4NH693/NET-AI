{% extends "base.html" %}

{% block content %}
<div class="container my-auto">
    <div class="row justify-content-center align-items-center">
        <div class="col-lg-8 col-xl-7 text-center">
            <!-- Hero Icon with Gradient Glow -->
            <div class="d-inline-flex align-items-center justify-content-center mb-4 p-3 rounded-circle"
                style="background: rgba(127, 0, 255, 0.1); border: 1px solid rgba(127, 0, 255, 0.2); width: 80px; height: 80px; box-shadow: 0 0 20px rgba(127, 0, 255, 0.2);">
                <i class="bi bi-rocket-takeoff-fill fs-2"
                    style="background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
            </div>

            <!-- Dynamic Heading -->
            <h1 class="display-4 fw-bold mb-3" id="heroTitle">
                Khám phá <span class="logo-text">NetAI Portal</span>
            </h1>

            <!-- Dynamic Description -->
            <p class="lead text-secondary mb-5 fs-5" id="heroDesc">

            </p>

            <!-- Blank Content Placeholder Card -->
            <div class="glass-card p-5 text-center position-relative overflow-hidden mb-5">
                <div class="position-absolute top-0 start-0 w-100 h-100 bg-gradient d-flex align-items-center justify-content-center opacity-10"
                    style="background: linear-gradient(135deg, rgba(127, 0, 255, 0.1) 0%, rgba(0, 198, 255, 0.1) 100%); pointer-events: none;">
                </div>

                <div class="position-relative z-1 py-4">
                    <i class="bi bi-layout-wtf fs-1 text-secondary opacity-50 mb-3"></i>
                    <h3 class="h5 fw-semibold text-light mb-2">Nội dung trang chủ trống</h3>
                    <p class="text-secondary small mb-0 mx-auto" style="max-width: 450px;">
                        khu vực thử nghiệm ai
                    </p>
                </div>
            </div>

            <!-- Dynamic CTA Buttons -->
            <div class="d-flex flex-wrap justify-content-center gap-3" id="heroActions">
                <!-- Fallback Loading spinner -->
                <div class="spinner-border text-light opacity-50" role="status"></div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block extra_js %}
<script src="{{ url_for('static', path='js/home.js') }}"></script>
{% endblock extra_js %}
